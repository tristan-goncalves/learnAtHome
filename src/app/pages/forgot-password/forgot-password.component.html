<div class="page-layout">
  <app-header></app-header>

  <main class="auth-page">
    <div class="auth-card card">
      <div class="back-link">
        <a routerLink="/connexion">
          <span class="material-icons">arrow_back</span>
          Retour à la connexion
        </a>
      </div>

      <div class="icon-container">
        <span class="material-icons">lock_reset</span>
      </div>

      <h1>Mot de passe oublié ?</h1>
      <p class="subtitle">
        Saisissez votre adresse email et nous vous enverrons un lien
        pour réinitialiser votre mot de passe.
      </p>

      <div class="success-banner" *ngIf="successMessage">
        ✅ {{ successMessage }}
      </div>

      <div class="error-banner" *ngIf="errorMessage">
        ⚠️ {{ errorMessage }}
      </div>

      <form (ngSubmit)="sendReset()" *ngIf="!successMessage" class="auth-form">
        <div class="form-group">
          <label>Adresse email</label>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="votre@email.com"
            required
            [class.error]="emailError"
          >
          <span class="error-msg" *ngIf="emailError">Veuillez saisir une adresse email valide</span>
        </div>

        <button
          type="submit"
          class="btn btn-primary submit-btn"
          [disabled]="!isValidEmail(email) || loading"
        >
          <span *ngIf="loading" class="spinner"></span>
          <span *ngIf="!loading">Envoyer le mail de récupération</span>
        </button>
      </form>

      <div class="success-actions" *ngIf="successMessage">
        <a routerLink="/connexion" class="btn btn-primary">Retour à la connexion</a>
      </div>
    </div>
  </main>

  <app-footer></app-footer>
</div>
